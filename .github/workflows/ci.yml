name: ShopSmart CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. CLIENT — Build (verify it compiles cleanly)
  # ─────────────────────────────────────────────
  client-build:
    name: "Client — Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # 2. CLIENT — Unit Tests & Linting
  # ─────────────────────────────────────────────
  client-checks:
    name: "Client — Tests & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        
      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

  # ─────────────────────────────────────────────
  # 3. BACKEND — Integration Tests & Linting
  # ─────────────────────────────────────────────
  backend-checks:
    name: "Backend — Tests & Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run integration tests
        run: npm test -- --forceExit --passWithNoTests

  # ─────────────────────────────────────────────
  # 4. E2E Tests — Playwright (Chromium)
  #    Depends on client build passing first
  # ─────────────────────────────────────────────
  e2e-tests:
    name: "E2E — Playwright (Chromium)"
    runs-on: ubuntu-latest
    needs: [client-build, backend-checks]
    defaults:
      run:
        working-directory: .
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
